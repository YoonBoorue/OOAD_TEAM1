name: ci-cd

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build and test (${{ matrix.build_type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Google Test with CTest
        run: ctest --test-dir build --output-on-failure

      - name: Run simulator smoke test
        run: ./build/rvc_simulator

      - name: Upload build test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.build_type }}
          path: |
            build/Testing
            build/OOAD_TEAM1
            build/rvc_simulator

  static-analysis:
    name: static analysis
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ cppcheck clang-tidy

      - name: Configure for compile database
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTING=ON

      - name: Cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++17 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            -I include \
            src simulator tests

      - name: Clang-Tidy
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' files < <(find src simulator tests -name '*.cpp' -print0)

          echo "clang-tidy target files:"
          printf '%s\n' "${files[@]}"

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No .cpp files found under src simulator tests"
            exit 1
          fi

          clang-tidy -p build "${files[@]}"

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ gcovr

      - name: Configure with coverage
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTING=ON \
            -DOOAD_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage reports
        run: |
          gcovr -r . \
            --exclude 'build/_deps' \
            --exclude 'tests' \
            --xml-pretty \
            -o build/coverage.xml

          gcovr -r . \
            --exclude 'build/_deps' \
            --exclude 'tests' \
            --html-details \
            -o build/coverage.html

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build/coverage.xml
            build/coverage.html

  deploy:
    name: deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-test, static-analysis, coverage]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Create release archive
        run: |
          tar czf "$RUNNER_TEMP/release.tgz" \
            --exclude=.git \
            --exclude=build \
            --exclude=.vscode \
            .

      - name: Upload release archive to EC2
        run: |
          scp -i ~/.ssh/id_ed25519 "$RUNNER_TEMP/release.tgz" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/ooad-team01-${{ github.sha }}.tgz"

      - name: Build, test, simulate on EC2 and switch current
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<EOF
            set -euo pipefail

            APP_DIR="${{ vars.APP_DIR }}"
            BINARY_NAME="${{ vars.BINARY_NAME }}"
            RELEASE_DIR="\$APP_DIR/releases/${{ github.sha }}"
            ARCHIVE="/tmp/ooad-team01-${{ github.sha }}.tgz"

            mkdir -p "\$RELEASE_DIR"
            tar xzf "\$ARCHIVE" -C "\$RELEASE_DIR"

            cmake -S "\$RELEASE_DIR" -B "\$RELEASE_DIR/build" \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=ON

            cmake --build "\$RELEASE_DIR/build" --parallel

            ctest --test-dir "\$RELEASE_DIR/build" --output-on-failure

            "\$RELEASE_DIR/build/rvc_simulator" > "\$RELEASE_DIR/simulator-smoke.log"

            cp "\$RELEASE_DIR/build/\$BINARY_NAME" "\$RELEASE_DIR/\$BINARY_NAME"
            chmod +x "\$RELEASE_DIR/\$BINARY_NAME"

            ln -sfn "\$RELEASE_DIR" "\$APP_DIR/current"
          EOF